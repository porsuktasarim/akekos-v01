version: '3.9'

services:
  app:
    build: .
    container_name: akekos-app
    restart: unless-stopped
    ports:
      - "2638:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      APP_NAME: AKEKOS
      APP_URL: http://localhost:2638
      MONGODB_URI: mongodb://akekos_user:akekos_pass@mongo:27017/akekos?authSource=akekos
      JWT_SECRET: change_this_jwt_secret_in_production_min32chars
      JWT_EXPIRE: 15m
      JWT_REFRESH_SECRET: change_this_refresh_secret_in_production
      JWT_REFRESH_EXPIRE: 7d
      SESSION_SECRET: change_this_session_secret_in_production
      SESSION_MAX_AGE: "604800000"
      BCRYPT_ROUNDS: "12"
      LOGIN_ATTEMPT_LIMIT: "5"
      LOGIN_LOCKOUT_TIME: "900000"
      UPLOAD_PATH: ./uploads
      MAX_FILE_SIZE: "10485760"
      LOG_LEVEL: info
      LOG_DIR: ./logs
      APP_LANG: tr
      SMTP_HOST: smtp.example.com
      SMTP_PORT: "587"
      SMTP_USER: noreply@akekos.local
      SMTP_PASS: change_smtp_password
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    networks:
      - akekos-net

  mongo:
    image: mongo:7
    container_name: akekos-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme_mongo_root
      MONGO_INITDB_DATABASE: akekos
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - akekos-net

volumes:
  mongo_data:
  uploads:
  logs:

networks:
  akekos-net:
    driver: bridge
